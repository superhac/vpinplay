<div id="afm-score-panel" class="afm-score-panel">
  <div class="afm-shell">
    <div class="afm-header">
      <div class="afm-header-main">
        <img
          class="afm-art"
          src="https://github.com/superhac/vpinmediadb/raw/refs/heads/main/9Paf7-CL/1k/bg.png"
          alt="Attack from Mars backglass art">
        <div class="afm-header-copy">
          <div class="afm-kicker">Attack from Mars</div>
          <h2>Score Panel</h2>
          <div class="afm-meta" id="afm-meta">Waiting for user score data.</div>
        </div>
      </div>
      <div class="afm-badge" id="afm-user-badge">No User</div>
    </div>

    <div class="afm-status" id="afm-status">Ready.</div>

    <div class="afm-grid" id="afm-grid" hidden>
      <section class="afm-card afm-card-hero" id="afm-grand-card">
        <div class="afm-card-title">Grand Champion</div>
        <div id="afm-grand-body" class="afm-hero-empty">No grand champion entry found.</div>
      </section>

      <section class="afm-card">
        <div class="afm-card-title">Highest Scores</div>
        <div id="afm-highest-body"></div>
      </section>

      <section class="afm-card">
        <div class="afm-card-title">Buy-In Highest Scores</div>
        <div id="afm-buyin-body"></div>
      </section>

      <section class="afm-card">
        <div class="afm-card-title">Martian Champion</div>
        <div id="afm-martian-body"></div>
      </section>

      <section class="afm-card">
        <div class="afm-card-title">Ruler Of The Universe</div>
        <div id="afm-ruler-body"></div>
      </section>
    </div>
  </div>
</div>

<style>
  .afm-score-panel {
    --afm-bg: linear-gradient(180deg, #08111d 0%, #13233a 55%, #08111d 100%);
    --afm-surface: rgba(11, 23, 39, 0.9);
    --afm-surface-soft: rgba(18, 34, 55, 0.82);
    --afm-line: rgba(107, 191, 255, 0.2);
    --afm-ink: #e8f6ff;
    --afm-muted: #9cc4dd;
    --afm-accent: #72e7ff;
    --afm-accent-2: #ffcc66;
    --afm-danger: #ff8f8f;
    --afm-shadow: 0 18px 48px rgba(0, 0, 0, 0.35);
    font-family: "Avenir Next", "Montserrat", "Segoe UI", sans-serif;
    color: var(--afm-ink);
  }

  .afm-shell {
    background:
      radial-gradient(700px 260px at 0% 0%, rgba(114, 231, 255, 0.14), transparent 60%),
      radial-gradient(700px 260px at 100% 0%, rgba(255, 204, 102, 0.16), transparent 60%),
      var(--afm-bg);
    border: 1px solid var(--afm-line);
    border-radius: 20px;
    padding: 18px;
    box-shadow: var(--afm-shadow);
  }

  .afm-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 14px;
    margin-bottom: 14px;
  }

  .afm-header-main {
    display: grid;
    grid-template-columns: 250px minmax(0, 1fr);
    gap: 16px;
    align-items: center;
    min-width: 0;
  }

  .afm-art {
    width: 250px;
    height: 141px;
    object-fit: cover;
    border-radius: 18px;
    border: 1px solid rgba(107, 191, 255, 0.22);
    box-shadow: 0 14px 36px rgba(0, 0, 0, 0.28);
    background: rgba(8, 17, 29, 0.6);
  }

  .afm-header-copy {
    min-width: 0;
  }

  .afm-kicker {
    color: var(--afm-accent);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-size: 0.74rem;
    font-weight: 700;
  }

  .afm-header h2 {
    margin: 4px 0 6px;
    font-size: 1.45rem;
  }

  .afm-meta {
    color: var(--afm-muted);
    font-size: 0.92rem;
  }

  .afm-badge {
    border: 1px solid rgba(255, 204, 102, 0.4);
    background: rgba(255, 204, 102, 0.14);
    color: var(--afm-accent-2);
    border-radius: 999px;
    padding: 8px 12px;
    font-size: 0.82rem;
    font-weight: 800;
    white-space: nowrap;
  }

  .afm-status {
    margin-bottom: 14px;
    border-radius: 12px;
    padding: 10px 12px;
    background: rgba(114, 231, 255, 0.12);
    border: 1px solid rgba(114, 231, 255, 0.24);
    color: var(--afm-accent);
    font-size: 0.9rem;
    font-weight: 700;
  }

  .afm-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 14px;
  }

  .afm-card {
    border: 1px solid var(--afm-line);
    border-radius: 16px;
    background: var(--afm-surface);
    padding: 14px;
    min-width: 0;
  }

  .afm-card-hero {
    grid-column: 1 / -1;
    background:
      linear-gradient(135deg, rgba(114, 231, 255, 0.08), rgba(255, 204, 102, 0.1)),
      var(--afm-surface);
  }

  .afm-card-title {
    margin-bottom: 12px;
    color: var(--afm-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-size: 0.78rem;
    font-weight: 800;
  }

  .afm-hero-empty,
  .afm-empty {
    color: var(--afm-muted);
    font-size: 0.92rem;
  }

  .afm-grand-wrap {
    display: flex;
    flex-wrap: wrap;
    gap: 18px;
    align-items: baseline;
  }

  .afm-grand-initials {
    font-size: 2.4rem;
    font-weight: 900;
    letter-spacing: 0.08em;
    color: var(--afm-accent);
  }

  .afm-grand-score {
    font-size: 1.6rem;
    font-weight: 800;
  }

  .afm-list {
    display: grid;
    gap: 10px;
  }

  .afm-row {
    display: grid;
    grid-template-columns: 56px minmax(0, 88px) minmax(0, 1fr);
    gap: 12px;
    align-items: center;
    padding: 10px 12px;
    border-radius: 12px;
    border: 1px solid rgba(107, 191, 255, 0.14);
    background: var(--afm-surface-soft);
  }

  .afm-rank {
    color: var(--afm-accent-2);
    font-weight: 800;
    font-size: 0.82rem;
    text-transform: uppercase;
  }

  .afm-initials {
    font-weight: 800;
    letter-spacing: 0.08em;
    font-size: 1rem;
  }

  .afm-value {
    text-align: right;
    font-weight: 700;
    min-width: 0;
  }

  .afm-extra {
    display: grid;
    gap: 8px;
  }

  .afm-pill {
    display: inline-flex;
    width: fit-content;
    border-radius: 999px;
    padding: 6px 10px;
    border: 1px solid rgba(255, 204, 102, 0.32);
    background: rgba(255, 204, 102, 0.12);
    color: var(--afm-accent-2);
    font-weight: 800;
    font-size: 0.8rem;
  }

  .afm-detail {
    color: var(--afm-ink);
    font-size: 0.98rem;
    font-weight: 700;
  }

  .afm-subtle {
    color: var(--afm-muted);
    font-size: 0.86rem;
  }

  @media (max-width: 760px) {
    .afm-header-main {
      grid-template-columns: 1fr;
    }

    .afm-art {
      width: 100%;
      max-width: 250px;
      height: 141px;
    }

    .afm-grid {
      grid-template-columns: 1fr;
    }

    .afm-row {
      grid-template-columns: 52px 72px minmax(0, 1fr);
      gap: 10px;
    }

    .afm-grand-initials {
      font-size: 2rem;
    }

    .afm-grand-score {
      font-size: 1.3rem;
    }
  }
</style>

<script>
(() => {
  const PANEL_VPS_ID = "9Paf7-CL";
  const DEFAULT_API_BASE = "https://api.vpinplay.com:8888";

  function q(id) {
    return document.getElementById(id);
  }

  function getCaseInsensitiveValue(obj, key) {
    if (!obj || typeof obj !== "object" || Array.isArray(obj)) return undefined;
    const wanted = String(key).toLowerCase();
    const matched = Object.keys(obj).find(k => String(k).toLowerCase() === wanted);
    return matched ? obj[matched] : undefined;
  }

  function getParams() {
    const params = new URLSearchParams(window.location.search);
    return {
      userId: (params.get("userid") || params.get("userId") || "").trim(),
      apiBase: (params.get("apibase") || params.get("apiBase") || "").trim(),
    };
  }

  function getApiBase() {
    const params = getParams();
    if (params.apiBase) return params.apiBase.replace(/\/$/, "");
    if (window.VPINPLAY_PANEL_CONFIG && typeof window.VPINPLAY_PANEL_CONFIG.apiBase === "string") {
      return window.VPINPLAY_PANEL_CONFIG.apiBase.replace(/\/$/, "");
    }
    return DEFAULT_API_BASE;
  }

  function getUserId() {
    const params = getParams();
    if (params.userId) return params.userId;
    if (window.VPINPLAY_PANEL_CONFIG && typeof window.VPINPLAY_PANEL_CONFIG.userId === "string") {
      return window.VPINPLAY_PANEL_CONFIG.userId.trim();
    }
    return "";
  }

  function setStatus(message, tone = "info") {
    const el = q("afm-status");
    if (!el) return;
    el.textContent = message;
    if (tone === "error") {
      el.style.color = "var(--afm-danger)";
      el.style.borderColor = "rgba(255, 143, 143, 0.28)";
      el.style.background = "rgba(255, 143, 143, 0.12)";
      return;
    }
    el.style.color = "var(--afm-accent)";
    el.style.borderColor = "rgba(114, 231, 255, 0.24)";
    el.style.background = "rgba(114, 231, 255, 0.12)";
  }

  function fmtNumber(value) {
    const num = Number(value);
    return Number.isFinite(num) ? num.toLocaleString() : "-";
  }

  function scoreText(entry) {
    if (entry.score !== null && entry.score !== undefined) {
      const base = fmtNumber(entry.score);
      return entry.value_suffix ? `${base} ${entry.value_suffix}` : base;
    }
    if (Array.isArray(entry.extra_lines) && entry.extra_lines.length) {
      return entry.extra_lines.join(" | ");
    }
    return "-";
  }

  function groupEntries(entries) {
    const groups = new Map();
    for (const entry of entries) {
      const section = String(entry.section || "").trim() || "Other";
      if (!groups.has(section)) groups.set(section, []);
      groups.get(section).push(entry);
    }
    return groups;
  }

  function scoreOwnerLabel(entry, replacement) {
    const entryInitials = typeof entry?.initials === "string" ? entry.initials.trim() : "";
    const entryUserId = typeof entry?.userId === "string"
      ? entry.userId.trim()
      : (typeof entry?.userid === "string" ? entry.userid.trim() : "");

    if (
      replacement &&
      replacement.initials &&
      replacement.userId &&
      entryInitials &&
      entryInitials.toUpperCase() === replacement.initials.toUpperCase()
    ) {
      return replacement.userId;
    }

    return entryUserId || entryInitials || "-";
  }

  function renderGrandChampion(entry, replacement = null) {
    const host = q("afm-grand-body");
    if (!host) return;
    if (!entry) {
      host.className = "afm-hero-empty";
      host.textContent = "No grand champion entry found.";
      return;
    }

    host.className = "";
    host.innerHTML = `
      <div class="afm-grand-wrap">
        <div class="afm-grand-initials">${scoreOwnerLabel(entry, replacement)}</div>
        <div class="afm-grand-score">${scoreText(entry)}</div>
      </div>
    `;
  }

  function renderRankedList(hostId, entries, replacement = null) {
    const host = q(hostId);
    if (!host) return;
    if (!entries.length) {
      host.innerHTML = `<div class="afm-empty">No entries available.</div>`;
      return;
    }

    host.innerHTML = `
      <div class="afm-list">
        ${entries.map(entry => `
          <div class="afm-row">
            <div class="afm-rank">${entry.rank === null || entry.rank === undefined ? "CHAMP" : `#${entry.rank}`}</div>
            <div class="afm-initials">${scoreOwnerLabel(entry, replacement)}</div>
            <div class="afm-value">${scoreText(entry)}</div>
          </div>
        `).join("")}
      </div>
    `;
  }

  function renderSpecial(hostId, entry, replacement = null) {
    const host = q(hostId);
    if (!host) return;
    if (!entry) {
      host.innerHTML = `<div class="afm-empty">No entry available.</div>`;
      return;
    }

    const extraLines = Array.isArray(entry.extra_lines) ? entry.extra_lines : [];
    const detail = scoreText(entry);
    host.innerHTML = `
      <div class="afm-extra">
        <div class="afm-pill">${scoreOwnerLabel(entry, replacement)}</div>
        ${detail ? `<div class="afm-detail">${detail}</div>` : ""}
        ${extraLines.length && entry.score != null
          ? extraLines.map(line => `<div class="afm-subtle">${line}</div>`).join("")
          : ""}
      </div>
    `;
  }

  function getScorePayload(row) {
    const direct = getCaseInsensitiveValue(row, "score");
    if (direct && typeof direct === "object" && !Array.isArray(direct)) return direct;

    const user = getCaseInsensitiveValue(row, "user");
    const nested = getCaseInsensitiveValue(user, "score");
    if (nested && typeof nested === "object" && !Array.isArray(nested)) return nested;
    return null;
  }

  async function api(path) {
    try {
      const response = await fetch(`${getApiBase()}${path}`);
      const data = await response.json().catch(() => ([]));
      return { ok: response.ok, status: response.status, data };
    } catch (error) {
      return { ok: false, status: 0, data: { error: error.message } };
    }
  }

  async function fetchScoreRow(userId) {
    const path = `/api/v1/users/${encodeURIComponent(userId)}/tables/with-score?vpsId=${encodeURIComponent(PANEL_VPS_ID)}&limit=1&offset=0`;
    return api(path);
  }

  async function fetchUserInitials(userId) {
    const path = `/api/v1/users/${encodeURIComponent(userId)}/initials`;
    return api(path);
  }

  async function loadPanel() {
    const userId = getUserId();
    q("afm-user-badge").textContent = userId || "No User";

    if (!userId) {
      setStatus("Missing userid. Load this panel with ?userid=<value>.", "error");
      return;
    }

    setStatus(`Loading score data for ${userId}...`);
    const [scoreResult, initialsResult] = await Promise.all([
      fetchScoreRow(userId),
      fetchUserInitials(userId),
    ]);

    if (!scoreResult.ok || !Array.isArray(scoreResult.data)) {
      setStatus(`Failed to load score data (${scoreResult.status || "network"}).`, "error");
      return;
    }

    const row = scoreResult.data.find(item => item && String(item.vpsId || "") === PANEL_VPS_ID);
    const score = row ? getScorePayload(row) : null;
    const entries = Array.isArray(score?.entries) ? score.entries : [];

    if (!row || !score || !entries.length) {
      setStatus(`No Attack from Mars score data found for ${userId}.`, "error");
      return;
    }

    const groups = groupEntries(entries);
    const replacement = initialsResult.ok && initialsResult.data
      ? {
          userId: String(initialsResult.data.userId || userId || "").trim(),
          initials: String(initialsResult.data.initials || "").trim(),
        }
      : null;

    renderGrandChampion((groups.get("GRAND CHAMPION") || [])[0] || null, replacement);
    renderRankedList("afm-highest-body", groups.get("HIGHEST SCORES") || [], replacement);
    renderRankedList("afm-buyin-body", groups.get("BUY-IN HIGHEST SCORES") || [], replacement);
    renderSpecial("afm-martian-body", (groups.get("MARTIAN CHAMPION") || [])[0] || null, replacement);
    renderSpecial("afm-ruler-body", (groups.get("RULER OF THE UNIVERSE") || [])[0] || null, replacement);

    const grid = q("afm-grid");
    if (grid) grid.hidden = false;

    const updatedAt = row.updatedAt ? new Date(row.updatedAt).toLocaleString() : "Unknown";
    q("afm-meta").textContent = `Last update: ${updatedAt}`;
    setStatus("Score data loaded.");
  }

  loadPanel();
})();
</script>
