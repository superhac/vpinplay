<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VPin Play Players Dashboard</title>
    <link rel="icon" type="image/png" href="img/logo.png" />
    <link rel="apple-touch-icon" href="img/logo.png" />
    <link rel="shortcut icon" href="img/logo.png" type="image/x-icon" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/players.css" />
    <script src="js/main.js"></script>
    <script src="components/vpinplay-header.js"></script>
    <script src="components/player-scores-panel.js"></script>
    <script src="components/players-data-table.js"></script>
    <script src="components/players-tables-carousel.js"></script>
  </head>
  <body>
    <vpinplay-header refresh-btn-id="refreshPlayersBtn"></vpinplay-header>
    <div class="main">
      <players-data-table
        api-url="/api/v1/users-plus/search"
        columns-order="userId,initials,tableCount,runTimeTotal,startCountTotal,submittedScores,lastSyncAt"
        class="panel panel-full"
      ></players-data-table>

      <section id="dashboard" class="grid-dashboard">
        <div class="grid-kpi panel panel-full">
          <div id="userBadge" class="user-badge"></div>
          <div class="kpi">
            <div class="kpi-label">Table Count</div>
            <div id="kpiTableCount" class="kpi-value">-</div>
            <div class="kpi-sub">Total submitted tables</div>
          </div>
          <div class="kpi">
            <div class="kpi-label">Total Activity</div>
            <div id="kpiTotalActivity" class="kpi-value">-</div>
            <div class="kpi-sub">Total runtime / startCount</div>
          </div>
          <div class="kpi">
            <div class="kpi-label">This Week Activity</div>
            <div id="kpiWeeklyActivity" class="kpi-value">-</div>
            <div class="kpi-sub">Last 7 days runtime / startCount delta</div>
          </div>
          <div class="kpi">
            <div class="kpi-label">Last Sync</div>
            <div id="kpiLastSync" class="kpi-value">-</div>
            <div class="kpi-sub">Latest successful sync</div>
          </div>
        </div>
        <player-scores-panel class="panel panel-full"></player-scores-panel>
      </section>

      <div id="carouselsContainer" class="carousels-container">
        <players-tables-carousel 
          title="Most Play Time" 
          shelf-stat="runTime"
          api-url="/tables/top-play-time">
        </players-tables-carousel>

        <players-tables-carousel 
          title="Recently Played" 
          shelf-stat="lastRun"
          api-url="/tables/recently-played">
        </players-tables-carousel>

        <players-tables-carousel 
          title="Most Played" 
          shelf-stat="startCount"
          api-url="/tables/most-played">
        </players-tables-carousel>

        <players-tables-carousel 
          title="Newest Added" 
          shelf-stat="createdAt"
          api-url="/tables/newly-added">
        </players-tables-carousel>
      </div>
    </div>
    <script src="js/players.js"></script>
  </body>
</html>
