<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VPin Play Tables Dashboard</title>
    <link rel="icon" type="image/png" href="img/logo.png" />
    <link rel="apple-touch-icon" href="img/logo.png" />
    <link rel="shortcut icon" href="img/logo.png" type="image/x-icon" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/tables.css" />
    <script src="js/main.js"></script>
    <script src="components/vpinplay-header.js"></script>
    <script src="components/table-scores-panel.js"></script>
  </head>
  <body>
    <vpinplay-header></vpinplay-header>
    <div class="main">
      <section id="setup" class="setup">
        <h2>Set VPS Game ID or Search By Table Name</h2>
        <form class="setup-row" onsubmit="handleTablesSetupSubmit(event)">
          <div class="field">
            <input
              id="vpsIdInput"
              type="text"
              value=""
              placeholder="Enter VPS ID"
            />
            <span
              id="vpsIdClear"
              class="clear-icon"
              onclick="clearInput('vpsIdInput')"
              >&times;</span
            >
          </div>

          <div class="field">
            <input
              id="vpsNameInput"
              type="text"
              placeholder="Search by Name"
              oninput="handleVpsNameInput(event)"
              onkeydown="handleNavigation(event)"
              autocomplete="off"
            />
            <span
              id="vpsNameClear"
              class="clear-icon"
              onclick="clearInput('vpsNameInput')"
              >&times;</span
            >
            <div id="vpsNameResults" class="search-results-popup"></div>
          </div>

          <div class="field">
            <input
              id="filehashInput"
              type="text"
              placeholder="Optional lookup by vpxFile.filehash"
            />
            <span
              id="filehashClear"
              class="clear-icon"
              onclick="clearInput('filehashInput')"
              >&times;</span
            >
          </div>

          <button type="submit" class="btn">Apply</button>
          <div id="lookupStatus" class="lookup-status muted">
            Enter a VPS Game Id, or start typing a table name to search and
            select from a list of tables. Optionally you can search for a
            vpxFile.filehash.
          </div>
        </form>
      </section>

      <section class="grid-panels">
        <section class="panel panel-full">
          <div id="vpsdbByIdDetails" class="variation-details"></div>
        </section>

        <table-scores-panel class="panel panel-full"></table-scores-panel>

        <section class="panel">
          <h3 id="playerRatingsTitle">Player Ratings (0)</h3>
          <table id="playerRatingsTable"></table>
        </section>

        <section class="panel">
          <h3 id="topRuntimePlayersTitle">Top Player Play Time (0)</h3>
          <table id="topRuntimePlayersTable"></table>
        </section>

        <section class="panel panel-full">
          <h3 id="associatedRomsTitle">Metadata</h3>
          <div id="associatedRomsDetails" class="variation-details"></div>
        </section>

        <section class="panel panel-full">
          <button
            id="derivativeDifferencesToggle"
            class="panel-toggle"
            type="button"
            aria-expanded="false"
            aria-controls="derivativeDifferencesDetails"
          >
            <span id="derivativeDifferencesTitle">Derivative Differences</span>
            <span class="panel-toggle-indicator" aria-hidden="true">+</span>
          </button>
          <div
            id="derivativeDifferencesDetails"
            class="variation-details hidden"
          ></div>
        </section>
      </section>
    </div>

    <script src="js/tables.js"></script>
  </body>
</html>
