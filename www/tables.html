<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VPinPlay Tables Dashboard</title>
    <link rel="icon" type="image/png" href="img/logo.png" />
    <link rel="apple-touch-icon" href="img/logo.png" />
    <link rel="shortcut icon" href="img/logo.png" type="image/x-icon" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/tables.css" />
    <script src="js/main.js"></script>
    <script src="components/vpinplay-header.js"></script>
  </head>
  <body>
    <vpinplay-header
      title="Tables Dashboard"
      subtitle="Last refresh: -"
      subtitle-id="lastRefresh"
      subtitle-class="muted"
    ></vpinplay-header>
    <div class="main">
      <section class="controls">
        <div class="field">
          <label for="vpsIdInput">VPS ID Focus</label>
          <input
            id="vpsIdInput"
            type="text"
            value="lkSumsrF"
            placeholder="Enter VPS ID"
            onkeydown="
              if (event.key === 'Enter') {
                refreshDashboard();
              }
            "
          />
        </div>
        <button class="btn" onclick="refreshDashboard()">Apply</button>
        <div class="field">
          <label for="filehashInput">Lookup by VPX File Hash</label>
          <input
            id="filehashInput"
            type="text"
            placeholder="Enter vpxFile.filehash"
            onkeydown="
              if (event.key === 'Enter') {
                lookupByFilehash();
              }
            "
          />
        </div>
        <button class="btn" onclick="lookupByFilehash()">Find by Hash</button>
        <div id="lookupStatus" class="lookup-status muted"></div>
      </section>

      <section class="grid-panels">
        <section class="panel panel-full">
          <div id="vpsdbByIdDetails" class="variation-details"></div>
        </section>

        <section id="scoreTablePanelShell" class="panel panel-full hidden">
          <div id="scoreTablePanelEmbed"></div>
        </section>

        <section class="panel">
          <h3 id="playerRatingsTitle">Player Ratings (0)</h3>
          <table id="playerRatingsTable"></table>
        </section>

        <section class="panel">
          <h3 id="associatedRomsTitle">Metadata</h3>
          <div id="associatedRomsDetails" class="variation-details"></div>
        </section>

        <section class="panel panel-full">
          <button
            id="derivativeDifferencesToggle"
            class="panel-toggle"
            type="button"
            aria-expanded="false"
            aria-controls="derivativeDifferencesDetails"
          >
            <span id="derivativeDifferencesTitle">Derivative Differences</span>
            <span class="panel-toggle-indicator" aria-hidden="true">+</span>
          </button>
          <div
            id="derivativeDifferencesDetails"
            class="variation-details hidden"
          ></div>
        </section>
      </section>
    </div>

    <script src="js/tables.js"></script>
  </body>
</html>
