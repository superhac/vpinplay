<link rel="stylesheet" href="../../css/score-table-panel.css">

<div id="afm-score-panel" class="afm-score-panel">
  <div class="afm-shell">
    <div class="afm-header">
      <div class="afm-header-main">
        <img
          class="afm-art"
          src="https://github.com/superhac/vpinmediadb/raw/refs/heads/main/WyxpJ3Wjt3/1k/bg.png"
          alt="Table backglass art">
        <div class="afm-header-copy">
          <h2 id="afm-title">Loading table...</h2>
          <div class="afm-rating-row">
            <div class="afm-rating-label">Rating</div>
            <div id="afm-rating" class="afm-rating">-</div>
          </div>
          <div class="afm-subhead" id="afm-subhead"></div>
          <div class="afm-meta" id="afm-meta">Waiting for global score data.</div>
        </div>
      </div>
    </div>

    <div class="afm-status" id="afm-status" hidden>Ready.</div>

    <div class="afm-stats" id="afm-stats">
      <section class="afm-stat-card">
        <div class="afm-stat-label">Total Table Plays</div>
        <div class="afm-stat-value" id="afm-stat-starts-total">-</div>
        <div class="afm-stat-sub">Sum of startCount</div>
      </section>

      <section class="afm-stat-card">
        <div class="afm-stat-label">Total Play Time</div>
        <div class="afm-stat-value" id="afm-stat-runtime-total">-</div>
        <div class="afm-stat-sub">Sum of runTime</div>
      </section>

      <section class="afm-stat-card">
        <div class="afm-stat-label">This Week Play Time</div>
        <div class="afm-stat-value" id="afm-stat-runtime-week">-</div>
        <div class="afm-stat-sub">Last 7 days (delta)</div>
      </section>

      <section class="afm-stat-card">
        <div class="afm-stat-label">This Week Plays</div>
        <div class="afm-stat-value" id="afm-stat-starts-week">-</div>
        <div class="afm-stat-sub">Last 7 days (delta)</div>
      </section>
    </div>

    <section class="afm-scoreboard-shell" id="afm-grid" hidden>
      <div class="afm-scoreboard-title">Scoreboard</div>
      <div class="afm-grid">
        <section class="afm-card">
          <div class="afm-card-title" id="afm-highest-title">HighScore</div>
          <div id="afm-highest-body"></div>
        </section>

        <section class="afm-card">
          <div class="afm-card-title" id="afm-buyin-title">Stat</div>
          <div id="afm-buyin-body"></div>
        </section>
      </div>
    </section>
  </div>
</div>

<script>
(() => {
  const PANEL_VPS_ID = "WyxpJ3Wjt3";
  const DEFAULT_API_BASE = "https://api.vpinplay.com:8888";
  const PAGE_SIZE = 500;
  const SECTION_LIMITS = {
    HighScore: 5,
    Stat: 16,
  };

  function q(id) {
    return document.getElementById(id);
  }

  function getParams() {
    const params = new URLSearchParams(window.location.search);
    return {
      apiBase: (params.get("apibase") || params.get("apiBase") || "").trim(),
    };
  }

  function getApiBase() {
    const params = getParams();
    if (params.apiBase) return params.apiBase.replace(/\/$/, "");
    if (window.VPINPLAY_PANEL_CONFIG && typeof window.VPINPLAY_PANEL_CONFIG.apiBase === "string") {
      return window.VPINPLAY_PANEL_CONFIG.apiBase.replace(/\/$/, "");
    }
    return DEFAULT_API_BASE;
  }

  function setStatus(message, tone = "info") {
    const el = q("afm-status");
    if (!el) return;
    el.hidden = false;
    el.textContent = message;
    if (tone === "error") {
      el.style.color = "var(--afm-danger)";
      el.style.borderColor = "rgba(255, 10, 120, 0.24)";
      el.style.background = "rgba(255, 10, 120, 0.12)";
      return;
    }
    el.style.color = "var(--afm-accent)";
    el.style.borderColor = "rgba(0, 217, 255, 0.2)";
    el.style.background = "rgba(0, 217, 255, 0.08)";
  }

  function clearStatus() {
    const el = q("afm-status");
    if (!el) return;
    el.hidden = true;
  }

  function fmtNumber(value) {
    const num = Number(value);
    return Number.isFinite(num) ? num.toLocaleString() : "-";
  }

  function escapeHtml(value) {
    return String(value ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function fmtRatingStars(value, options = {}) {
    if (value === null || value === undefined || value === "") return "-";
    const numeric = Number(value);
    if (!Number.isFinite(numeric)) return "-";
    const clamped = Math.max(0, Math.min(5, numeric));
    const roundedToHalf = Math.round(clamped * 2) / 2;
    const fullStars = Math.floor(roundedToHalf);
    const hasHalf = roundedToHalf - fullStars >= 0.5;
    let stars = "";
    for (let i = 0; i < 5; i += 1) {
      const fillPercent =
        i < fullStars ? 100 : i === fullStars && hasHalf ? 50 : 0;
      stars += `<span class="rating-star-cell" aria-hidden="true"><span class="rating-star empty">★</span><span class="rating-star fill" style="width:${fillPercent}%">★</span></span>`;
    }
    const numericText = options.showNumeric
      ? ` <span class="rating-value">(${escapeHtml(clamped.toFixed(2))})</span>`
      : "";
    return `<span class="rating-stars" title="${escapeHtml(clamped.toFixed(2))} / 5" aria-label="${escapeHtml(clamped.toFixed(2))} out of 5 stars">${stars}</span>${numericText}`;
  }

  function fmtUpdatedAt(value) {
    if (!value) return "Unknown";
    const dt = new Date(value);
    return Number.isNaN(dt.getTime()) ? "Unknown" : dt.toLocaleString();
  }

  function buildTableSubtitle(rows) {
    const firstVpsdb = rows
      .map(row => row?.vpsdb)
      .find(vpsdb => vpsdb && typeof vpsdb === "object");

    const manufacturer = typeof firstVpsdb?.manufacturer === "string"
      ? firstVpsdb.manufacturer.trim()
      : "";
    const year = firstVpsdb?.year === null || firstVpsdb?.year === undefined
      ? ""
      : String(firstVpsdb.year).trim();

    return [manufacturer, year].filter(Boolean).join(" • ");
  }

  function scoreText(entry) {
    if (entry.score !== null && entry.score !== undefined) {
      const base = fmtNumber(entry.score);
      return entry.value_suffix ? `${base} ${entry.value_suffix}` : base;
    }
    if (Array.isArray(entry.extra_lines) && entry.extra_lines.length) {
      return entry.extra_lines.join(" | ");
    }
    return "-";
  }

  function numericScore(entry) {
    const num = Number(entry?.score);
    return Number.isFinite(num) ? num : null;
  }

  function compareEntries(a, b) {
    const aScore = numericScore(a);
    const bScore = numericScore(b);
    if (aScore !== null && bScore !== null && aScore !== bScore) {
      return bScore - aScore;
    }
    if (aScore !== null && bScore === null) return -1;
    if (aScore === null && bScore !== null) return 1;

    const aRank = Number(a?.rank);
    const bRank = Number(b?.rank);
    const hasARank = Number.isFinite(aRank);
    const hasBRank = Number.isFinite(bRank);
    if (hasARank && hasBRank && aRank !== bRank) {
      return aRank - bRank;
    }
    if (hasARank && !hasBRank) return -1;
    if (!hasARank && hasBRank) return 1;

    const aMatched = a?.matchedUserId ? 1 : 0;
    const bMatched = b?.matchedUserId ? 1 : 0;
    if (aMatched !== bMatched) {
      return bMatched - aMatched;
    }

    return String(a?.updatedAt || "").localeCompare(String(b?.updatedAt || ""));
  }

  function groupEntries(entries) {
    const groups = new Map();
    for (const entry of entries) {
      const section = String(entry.section || "").trim() || "Other";
      if (!groups.has(section)) groups.set(section, []);
      groups.get(section).push(entry);
    }
    for (const [section, sectionEntries] of groups.entries()) {
      groups.set(section, sectionEntries.slice().sort(compareEntries));
    }
    return groups;
  }

  function getPreferredSectionOrder(groups) {
    const preferred = [
      "GRAND CHAMPION",
      "HIGHEST SCORES",
      "BUY-IN HIGHEST SCORES",
    ];
    const available = [...groups.keys()];
    const ordered = preferred.filter(section => groups.has(section));
    available.forEach((section) => {
      if (!ordered.includes(section)) ordered.push(section);
    });
    return ordered;
  }

  function scoreOwnerLabel(entry) {
    return typeof entry?.matchedUserId === "string" ? entry.matchedUserId : "";
  }

  function renderRankedList(hostId, entries) {
    const host = q(hostId);
    if (!host) return;
    if (!entries.length) {
      host.innerHTML = `<div class="afm-empty">No entries available.</div>`;
      return;
    }

    host.innerHTML = `
      <div class="afm-list">
        ${entries.map((entry, index) => `
          <div class="afm-row">
            <div class="afm-rank">#${index + 1}</div>
            <div class="afm-initials">${scoreOwnerLabel(entry)}</div>
            <div class="afm-value">${scoreText(entry)}</div>
          </div>
        `).join("")}
      </div>
    `;
  }

  function setSectionTitle(id, text) {
    const el = q(id);
    if (el) el.textContent = text;
  }

  function getSectionLimit(sectionName) {
    if (!sectionName) return 5;
    return SECTION_LIMITS[sectionName] || 5;
  }

  async function api(path) {
    try {
      const response = await fetch(`${getApiBase()}${path}`);
      const data = await response.json().catch(() => ([]));
      return { ok: response.ok, status: response.status, data };
    } catch (error) {
      return { ok: false, status: 0, data: { error: error.message } };
    }
  }

  async function fetchBestEverScoreItems() {
    const items = [];
    for (let offset = 0; ; offset += PAGE_SIZE) {
      const result = await api(`/api/v1/users/scores/best-ever?vpsId=${encodeURIComponent(PANEL_VPS_ID)}&limit=${PAGE_SIZE}&offset=${offset}`);
      const pageItems = Array.isArray(result.data?.items) ? result.data.items : null;
      if (!result.ok || !pageItems) {
        return { ok: false, status: result.status, error: result.data?.error || "Request failed", items };
      }
      items.push(...pageItems);
      if (pageItems.length < PAGE_SIZE) break;
    }
    return { ok: true, items };
  }

  async function fetchCumulativeRating() {
    const path = `/api/v1/tables/${encodeURIComponent(PANEL_VPS_ID)}/cumulative-rating`;
    return api(path);
  }

  async function fetchActivitySummary() {
    const path = `/api/v1/tables/${encodeURIComponent(PANEL_VPS_ID)}/activity-summary`;
    return api(path);
  }

  async function fetchWeeklyActivity() {
    const path = `/api/v1/tables/${encodeURIComponent(PANEL_VPS_ID)}/activity-weekly?days=7`;
    return api(path);
  }

  function normalizeBestEverItems(items) {
    return items
      .filter(item => item && item.score && typeof item.score === "object")
      .map(item => ({
        ...item.score,
        matchedUserId: typeof item.userId === "string" ? item.userId : "",
        updatedAt: item.updatedAt || null,
        vpsdb: item.vpsdb,
        tableTitle: item.tableTitle,
      }));
  }

  function setStatValue(id, value) {
    const el = q(id);
    if (el) el.textContent = value;
  }

  async function loadPanel() {
    setStatus(`Loading global score data for ${PANEL_VPS_ID}...`);
    const [bestEverResult, ratingResult, activityResult, weeklyActivityResult] = await Promise.all([
      fetchBestEverScoreItems(),
      fetchCumulativeRating(),
      fetchActivitySummary(),
      fetchWeeklyActivity(),
    ]);

    if (!bestEverResult.ok) {
      setStatus(`Failed to load score data (${bestEverResult.status || "network"}).`, "error");
      return;
    }

    const items = bestEverResult.items.filter(item => item && String(item.vpsId || "") === PANEL_VPS_ID);
    if (!items.length) {
      setStatus("No historical matched score entries were found for this table.", "error");
      return;
    }

    const subhead = q("afm-subhead");
    if (subhead) {
      subhead.textContent = buildTableSubtitle(items);
      subhead.hidden = !subhead.textContent;
    }

    const vpsdb = items
      .map(item => item?.vpsdb)
      .find(item => item && typeof item === "object");
    const title = q("afm-title");
    if (title && typeof vpsdb?.name === "string" && vpsdb.name.trim()) {
      title.textContent = vpsdb.name.trim();
    }

    const rating = q("afm-rating");
    if (rating) {
      const cumulativeRating = ratingResult.ok ? ratingResult.data?.cumulativeRating : null;
      rating.innerHTML = cumulativeRating
        ? fmtRatingStars(cumulativeRating, { showNumeric: true })
        : `No ratings`;
    }

    const entries = normalizeBestEverItems(items);

    if (!entries.length) {
      setStatus("No historical matched score entries were found for this table.", "error");
      return;
    }

    const groups = groupEntries(entries);
    const orderedSections = getPreferredSectionOrder(groups);
    const listSectionOne = orderedSections[0] || null;
    const listSectionTwo = orderedSections[1] || null;

    setSectionTitle("afm-highest-title", listSectionOne || "Scores");
    setSectionTitle("afm-buyin-title", listSectionTwo || "More Scores");
    const listOneEntries = listSectionOne
      ? (groups.get(listSectionOne) || []).slice(0, getSectionLimit(listSectionOne))
      : [];
    const listTwoEntries = listSectionTwo
      ? (groups.get(listSectionTwo) || []).slice(0, getSectionLimit(listSectionTwo))
      : [];
    renderRankedList("afm-highest-body", listOneEntries);
    renderRankedList("afm-buyin-body", listTwoEntries);

    const grid = q("afm-grid");
    if (grid) grid.hidden = false;

    const latestUpdatedAt = items
      .map(item => item.updatedAt)
      .filter(Boolean)
      .sort((a, b) => String(b).localeCompare(String(a)))[0];

    q("afm-meta").textContent = `Latest update: ${fmtUpdatedAt(latestUpdatedAt)}`;
    const runTimeTotal = activityResult.ok ? Number(activityResult.data?.runTimeTotal || 0) : 0;
    const startCountTotal = activityResult.ok ? Number(activityResult.data?.startCountTotal || 0) : 0;
    const runTimeWeek = weeklyActivityResult.ok ? Number(weeklyActivityResult.data?.runTimePlayed || 0) : 0;
    const startCountWeek = weeklyActivityResult.ok ? Number(weeklyActivityResult.data?.startCountPlayed || 0) : 0;
    setStatValue("afm-stat-starts-total", fmtNumber(startCountTotal));
    setStatValue("afm-stat-runtime-total", `${fmtNumber(runTimeTotal)} min`);
    setStatValue("afm-stat-runtime-week", `${fmtNumber(runTimeWeek)} min`);
    setStatValue("afm-stat-starts-week", fmtNumber(startCountWeek));
    clearStatus();
  }

  loadPanel();
})();
</script>
