<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VPin Play Global Dashboard</title>
    <link rel="icon" type="image/png" href="img/logo.png" />
    <link rel="apple-touch-icon" href="img/logo.png" />
    <link rel="shortcut icon" href="img/logo.png" type="image/x-icon" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/base.css" />
    <script src="js/main.js"></script>
    <script src="components/vpinplay-header.js"></script>
    <script src="components/tables-data-table.js"></script>
  </head>
  <body>
    <vpinplay-header></vpinplay-header>
    <div class="main">
      <tables-data-table
        api-url="/api/v1/tables-plus/search"
        searchKey="name"
        sortBy="avgRating"
        sortOrder="-1"
        columns-order="avgRating, name, manufacturer, year, authors, ratingCount, playerCount, startCountTotal, runTimeTotal, variationCount, vpsId, firstSeenAt"
        class="panel panel-full"
      ></tables-data-table>
    </div>
  </body>
</html>
