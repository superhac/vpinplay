<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPinPlay Table Dashboard</title>
    <style>
        :root {
            --bg: #f5f7fb;
            --surface: #ffffff;
            --surface-2: #f1f6ff;
            --line: #dbe3f0;
            --ink: #1b2a41;
            --muted: #63738d;
            --hero-a: #0f766e;
            --hero-b: #1d4ed8;
            --hero-border: rgba(255, 255, 255, 0.18);
            --link: #1d4ed8;
            --table-row: #ffffff;
            --table-row-alt: #f8fbff;
            --table-hover: #e9f2ff;
            --bg-glow-a: rgba(14, 123, 108, 0.15);
            --bg-glow-b: rgba(29, 78, 216, 0.14);
            --shadow: 0 12px 32px rgba(15, 23, 42, 0.08);
            --radius: 14px;
        }

        [data-theme="dark"] {
            --bg: #0a1220;
            --surface: #111d31;
            --surface-2: #172742;
            --line: #273b5b;
            --ink: #e8f0ff;
            --muted: #9fb1cc;
            --hero-a: #0b4f57;
            --hero-b: #1a3769;
            --hero-border: rgba(159, 177, 204, 0.22);
            --link: #8ab4ff;
            --table-row: #10203a;
            --table-row-alt: #142844;
            --table-hover: #1e365b;
            --bg-glow-a: rgba(12, 109, 96, 0.22);
            --bg-glow-b: rgba(29, 78, 216, 0.2);
            --shadow: 0 12px 32px rgba(2, 8, 20, 0.5);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: "Avenir Next", "Montserrat", "Segoe UI", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(900px 420px at -10% -10%, var(--bg-glow-a), transparent 60%),
                radial-gradient(900px 420px at 110% -15%, var(--bg-glow-b), transparent 65%),
                var(--bg);
            transition: background 180ms ease, color 180ms ease;
        }

        a { color: var(--link); }

        .wrap {
            width: 100%;
            max-width: none;
            margin: 0;
            padding: 24px 16px 40px;
        }

        .hero {
            background: linear-gradient(135deg, var(--hero-a), var(--hero-b));
            color: #f8fbff;
            border: 1px solid var(--hero-border);
            border-radius: 18px;
            padding: 18px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            box-shadow: var(--shadow);
        }

        .hero h1 { margin: 0; font-size: clamp(1.25rem, 2vw, 1.9rem); }

        .hero-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .pill, .btn {
            border-radius: 999px;
            padding: 8px 12px;
            font-size: 0.88rem;
            font-weight: 700;
            text-decoration: none;
        }

        .pill {
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.35);
            background: rgba(255, 255, 255, 0.12);
        }

        .btn {
            border: none;
            color: #173264;
            background: #fff;
            cursor: pointer;
            border: 1px solid transparent;
            transition: transform 120ms ease, filter 120ms ease;
        }

        .btn:hover {
            transform: translateY(-1px);
            filter: brightness(0.98);
        }

        .btn-theme {
            background: transparent;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .controls, .panel {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        .controls {
            margin-top: 14px;
            padding: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: end;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .field label {
            font-size: 0.82rem;
            color: var(--muted);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        input {
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 9px 11px;
            min-width: 280px;
            font-size: 0.94rem;
        }

        .grid-panels {
            margin-top: 12px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        .panel {
            padding: 12px;
            min-height: 240px;
            overflow: hidden;
        }

        .panel h3 {
            margin: 0 0 10px;
            font-size: 1rem;
        }

        .panel p {
            margin: 0 0 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.88rem;
        }

        th, td {
            text-align: left;
            padding: 10px 8px;
            border-bottom: 1px solid var(--line);
            vertical-align: top;
        }

        th {
            color: var(--muted);
            font-size: 0.76rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: var(--surface-2);
        }

        tr td { background: var(--table-row); }
        tbody tr:nth-child(even) td { background: var(--table-row-alt); }
        tbody tr:hover td { background: var(--table-hover); }

        .muted { color: var(--muted); }

        .rating-stars {
            display: inline-flex;
            align-items: center;
            gap: 1px;
            white-space: nowrap;
        }

        .rating-star-cell {
            position: relative;
            display: inline-block;
            width: 0.95em;
            height: 1em;
            line-height: 1;
        }

        .rating-star {
            display: block;
            font-size: 0.95rem;
            line-height: 1;
        }

        .rating-star.fill {
            position: absolute;
            left: 0;
            top: 0;
            overflow: hidden;
            white-space: nowrap;
            line-height: 1;
            color: #facc15;
        }

        .rating-star.empty {
            color: var(--muted);
            opacity: 0.45;
        }

        .rating-value {
            margin-left: 6px;
            color: var(--muted);
            font-size: 0.84em;
        }

        .rating-separator {
            color: var(--muted);
            margin: 0 6px;
        }

        .variation-details {
            margin-top: 12px;
            display: grid;
            gap: 10px;
        }

        .variation-card {
            border: 1px solid var(--line);
            border-radius: 10px;
            background: var(--surface-2);
            padding: 10px;
        }

        .variation-title {
            font-weight: 700;
            margin-bottom: 8px;
            font-size: 0.92rem;
        }

        .variation-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px 10px;
        }

        .variation-field {
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 8px;
            background: var(--surface);
        }

        .variation-label {
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--muted);
            margin-bottom: 4px;
            font-weight: 700;
        }

        .variation-value {
            font-size: 0.9rem;
            word-break: break-word;
        }

        @media (max-width: 640px) {
            input { min-width: 0; width: 100%; }
            .variation-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <section class="hero">
            <div>
                <h1>Table Dashboard (Testing)</h1>
                <div id="lastRefresh" class="muted">Last refresh: -</div>
            </div>
            <div class="hero-actions">
                <button id="themeToggleBtn" class="btn btn-theme" onclick="toggleTheme()">Dark</button>
                <button class="btn" onclick="refreshDashboard()">Refresh</button>
                <a class="pill" href="main.html">Open Global</a>
                <a class="pill" href="player.html">Open Player</a>
            </div>
        </section>

        <section class="controls">
            <div class="field">
                <label for="vpsIdInput">VPS ID Focus</label>
                <input id="vpsIdInput" type="text" value="lkSumsrF" placeholder="Enter VPS ID">
            </div>
            <button class="btn" onclick="refreshDashboard()">Apply</button>
        </section>

        <section class="grid-panels">
            <section class="panel">
                <h3>Rating Summary</h3>
                <table id="ratingSummaryTable"></table>
            </section>

            <section class="panel">
                <h3 id="tableVariationsTitle">Table Variations (0)</h3>
                <div id="tableByIdDetails" class="variation-details"></div>
            </section>

            <section class="panel">
                <h3>VPSDB Record</h3>
                <div id="vpsdbByIdDetails" class="variation-details"></div>
            </section>
        </section>
    </div>

    <script>
        const API_BASE = "https://api.vpinplay.com:8888";

        function q(id) { return document.getElementById(id); }

        function getPreferredTheme() {
            const saved = localStorage.getItem("vpin-theme");
            if (saved === "light" || saved === "dark") return saved;
            return window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        }

        function updateThemeToggleLabel(theme) {
            const btn = q("themeToggleBtn");
            if (!btn) return;
            btn.textContent = theme === "dark" ? "Light" : "Dark";
        }

        function applyTheme(theme) {
            document.documentElement.setAttribute("data-theme", theme);
            updateThemeToggleLabel(theme);
        }

        function initTheme() {
            applyTheme(getPreferredTheme());
        }

        function toggleTheme() {
            const next = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
            localStorage.setItem("vpin-theme", next);
            applyTheme(next);
        }

        function getVpsidFromUrl() {
            const params = new URLSearchParams(window.location.search);
            return (params.get("vpsid") || "").trim();
        }

        function setVpisidInUrl(vpsId) {
            const url = new URL(window.location.href);
            if (vpsId) {
                url.searchParams.set("vpsid", vpsId);
            } else {
                url.searchParams.delete("vpsid");
            }
            window.history.replaceState({}, "", url);
        }

        function escapeHtml(value) {
            return String(value ?? "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        function fmtDate(value) {
            if (!value) return "-";
            const raw = String(value).trim();
            const hasTimeZone = /([zZ]|[+-]\d{2}:\d{2})$/.test(raw);
            const normalized = !hasTimeZone && raw.includes("T") ? `${raw}Z` : raw;
            const d = new Date(normalized);
            if (Number.isNaN(d.getTime())) return "-";
            return d.toLocaleString(undefined, { dateStyle: "medium", timeStyle: "medium" });
        }

        function fmtTableName(row) {
            const name = row?.vpsdb?.name || "Unknown Table";
            const manufacturer = row?.vpsdb?.manufacturer;
            const year = row?.vpsdb?.year;
            const parts = [manufacturer, year].filter(v => v !== null && v !== undefined && String(v).trim() !== "");
            return parts.length ? `${name} (${parts.join(", ")})` : name;
        }

        function fmtRatingStars(value, options = {}) {
            if (value === null || value === undefined || value === "") return "-";
            const numeric = Number(value);
            if (!Number.isFinite(numeric)) return "-";
            const clamped = Math.max(0, Math.min(5, numeric));
            const roundedToHalf = Math.round(clamped * 2) / 2;
            const fullStars = Math.floor(roundedToHalf);
            const hasHalf = roundedToHalf - fullStars >= 0.5;
            let stars = "";
            for (let i = 0; i < 5; i += 1) {
                const fillPercent = i < fullStars ? 100 : (i === fullStars && hasHalf ? 50 : 0);
                stars += `<span class="rating-star-cell" aria-hidden="true"><span class="rating-star empty">★</span><span class="rating-star fill" style="width:${fillPercent}%">★</span></span>`;
            }
            const numericText = options.showNumeric ? ` <span class="rating-value">(${escapeHtml(clamped.toFixed(2))})</span>` : "";
            return `<span class="rating-stars" title="${escapeHtml(clamped.toFixed(2))} / 5" aria-label="${escapeHtml(clamped.toFixed(2))} out of 5 stars">${stars}</span>${numericText}`;
        }

        function linkVpsId(vpsId) {
            const id = String(vpsId || "").trim();
            if (!id) return "-";
            return `<a href="https://virtualpinballspreadsheet.github.io/games?game=${encodeURIComponent(id)}" target="_blank" rel="noopener noreferrer">${escapeHtml(id)}</a>`;
        }

        async function api(path) {
            try {
                const response = await fetch(`${API_BASE}${path}`);
                const data = await response.json().catch(() => ({}));
                return { ok: response.ok, status: response.status, data };
            } catch (error) {
                return { ok: false, status: 0, data: { error: error.message } };
            }
        }

        function renderTable(elId, columns, rows) {
            const el = q(elId);
            if (!rows || rows.length === 0) {
                el.innerHTML = `<tr><td class="muted">No data</td></tr>`;
                return;
            }

            let html = "<thead><tr>";
            columns.forEach(col => { html += `<th>${escapeHtml(col.label)}</th>`; });
            html += "</tr></thead><tbody>";

            rows.forEach(row => {
                html += "<tr>";
                columns.forEach(col => {
                    const raw = col.getter(row);
                    const text = raw === null || raw === undefined || raw === "" ? "-" : raw;
                    html += `<td>${col.html ? text : escapeHtml(text)}</td>`;
                });
                html += "</tr>";
            });

            html += "</tbody>";
            el.innerHTML = html;
        }

        function renderVariationDetails(rows) {
            const container = q("tableByIdDetails");
            const title = q("tableVariationsTitle");
            const count = Array.isArray(rows) ? rows.length : 0;
            if (title) {
                title.textContent = `Table Variations (${count})`;
            }

            if (!rows || rows.length === 0) {
                container.innerHTML = `<div class="muted">No table variations found for this VPS ID.</div>`;
                return;
            }

            let html = "";
            rows.forEach((row) => {
                const filename = row?.vpxFile?.filename || "Unknown file";
                const field = (label, value, isHtml = false) => `
                    <div class="variation-field">
                        <div class="variation-label">${escapeHtml(label)}</div>
                        <div class="variation-value">${isHtml ? (value ?? "-") : escapeHtml(value ?? "-")}</div>
                    </div>
                `;

                const priorityOrder = [
                    "vpsdb.name",
                    "vpsdb.manufacturer",
                    "vpsdb.year",
                    "vpsdb.authors",
                    "vpsId",
                    "rom",
                    "vpxFile.filename",
                    "vpxFile.filehash",
                    "vpxFile.version",
                    "vpxFile.rom",
                    "createdAt",
                    "updatedAt",
                    "lastSeenAt"
                ];

                const flatFields = flattenObject(row)
                    .map(item => {
                        const raw = item.value;
                        const isDateField = /(At|Run)$/i.test(item.key);
                        const isVpsIdField = /(^|\.)(vpsId)$/i.test(item.key);
                        const rendered = isDateField ? fmtDate(raw) : (raw ?? "-");
                        return { key: item.key, value: rendered, html: isVpsIdField ? linkVpsId(raw) : null };
                    });

                const priorityMap = new Map(priorityOrder.map((k, i) => [k, i]));
                flatFields.sort((a, b) => {
                    const ai = priorityMap.has(a.key) ? priorityMap.get(a.key) : 9999;
                    const bi = priorityMap.has(b.key) ? priorityMap.get(b.key) : 9999;
                    if (ai !== bi) return ai - bi;
                    return a.key.localeCompare(b.key);
                });

                const fieldsHtml = flatFields.map(item => field(item.key, item.html ?? item.value, !!item.html)).join("");
                html += `
                    <article class="variation-card">
                        <div class="variation-title">${escapeHtml(filename)}</div>
                        <div class="variation-grid">
                            ${field("tableLabel", fmtTableName(row))}
                            ${fieldsHtml}
                        </div>
                    </article>
                `;
            });
            container.innerHTML = html;
        }

        function flattenObject(obj, prefix = "") {
            const out = [];
            if (obj === null || obj === undefined) {
                out.push({ key: prefix || "value", value: "-" });
                return out;
            }
            if (Array.isArray(obj)) {
                out.push({ key: prefix, value: obj.map(item => (typeof item === "object" ? JSON.stringify(item) : String(item))).join(", ") || "-" });
                return out;
            }
            if (typeof obj !== "object") {
                out.push({ key: prefix || "value", value: obj });
                return out;
            }

            Object.entries(obj).forEach(([key, value]) => {
                const path = prefix ? `${prefix}.${key}` : key;
                if (value && typeof value === "object" && !Array.isArray(value)) {
                    out.push(...flattenObject(value, path));
                } else if (Array.isArray(value)) {
                    out.push({ key: path, value: value.map(item => (typeof item === "object" ? JSON.stringify(item) : String(item))).join(", ") || "-" });
                } else {
                    out.push({ key: path, value });
                }
            });
            return out;
        }

        function renderVpsdbDetails(record) {
            const container = q("vpsdbByIdDetails");
            if (!record) {
                container.innerHTML = `<div class="muted">No VPSDB record found for this VPS ID.</div>`;
                return;
            }

            const field = (label, value, isHtml = false) => `
                <div class="variation-field">
                    <div class="variation-label">${escapeHtml(label)}</div>
                    <div class="variation-value">${isHtml ? (value ?? "-") : escapeHtml(value ?? "-")}</div>
                </div>
            `;

            const flatFields = flattenObject(record).map(item => {
                const raw = item.value;
                const isDateField = /(At|Run)$/i.test(item.key);
                const isVpsIdField = /(^|\.)(vpsId)$/i.test(item.key);
                return {
                    key: item.key,
                    value: isDateField ? fmtDate(raw) : (raw ?? "-"),
                    html: isVpsIdField ? linkVpsId(raw) : null
                };
            });

            const fieldsHtml = flatFields.map(item => field(item.key, item.html ?? item.value, !!item.html)).join("");
            container.innerHTML = `
                <article class="variation-card">
                    <div class="variation-title">${escapeHtml(record?.vpsdb?.name || record?.vpsId || "VPSDB Record")}</div>
                    <div class="variation-grid">
                        ${fieldsHtml}
                    </div>
                </article>
            `;
        }

        async function refreshDashboard() {
            const vpsId = q("vpsIdInput").value.trim();
            setVpisidInUrl(vpsId);
            q("lastRefresh").textContent = `Last refresh: ${new Date().toLocaleString()}`;

            if (!vpsId) {
                renderTable("ratingSummaryTable", [{ label: "Info", getter: () => "Enter a VPS ID" }], []);
                renderVariationDetails([]);
                renderVpsdbDetails(null);
                return;
            }

            const [ratingSummaryRes, tableByIdRes, vpsdbByIdRes] = await Promise.all([
                api(`/api/v1/tables/${encodeURIComponent(vpsId)}/rating-summary`),
                api(`/api/v1/tables/${encodeURIComponent(vpsId)}`),
                api(`/api/v1/vpsdb/${encodeURIComponent(vpsId)}`),
            ]);

            const ratingSummaryRows = ratingSummaryRes.ok && ratingSummaryRes.data ? [ratingSummaryRes.data] : [];
            renderTable("ratingSummaryTable",
                [
                    { label: "Table", getter: r => fmtTableName(r) },
                    { label: "Avg Rating", getter: r => fmtRatingStars(r.avgRating, { showNumeric: true }), html: true },
                    { label: "Rating Count", getter: r => r.ratingCount ?? "-" },
                    { label: "VPS ID", getter: r => linkVpsId(r.vpsId), html: true },
                ],
                ratingSummaryRows
            );

            const byIdRows = tableByIdRes.ok && Array.isArray(tableByIdRes.data) ? tableByIdRes.data : [];
            renderVariationDetails(byIdRows);

            const vpsdbRecord = vpsdbByIdRes.ok && vpsdbByIdRes.data ? vpsdbByIdRes.data : null;
            renderVpsdbDetails(vpsdbRecord);
        }

        document.addEventListener("DOMContentLoaded", () => {
            initTheme();
            const vpsid = getVpsidFromUrl();
            if (vpsid) {
                q("vpsIdInput").value = vpsid;
            }
            refreshDashboard();
        });
    </script>
</body>
</html>
